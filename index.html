<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Personal Assistant</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f7fe;
            --card-bg: #ffffff;
            --primary: #4361ee;
            --secondary: #3f37c9;
            --text: #2b2d42;
            --accent: #4cc9f0;
            --success: #4caf50;
            --glass: rgba(255, 255, 255, 0.7);
        }

        body.dark-mode {
            --bg: #0b0e14;
            --card-bg: #1a1f26;
            --text: #e0e0e0;
            --glass: rgba(0, 0, 0, 0.6);
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        body { 
            margin: 0; font-family: 'Poppins', sans-serif; 
            background: var(--bg); color: var(--text);
            overflow-x: hidden;
        }

        /* Navbar Style */
        header {
            position: sticky; top: 0; z-index: 1000;
            background: var(--glass); backdrop-filter: blur(15px);
            padding: 1rem 5%; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 30px rgba(0,0,0,0.05);
        }

        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1.5rem; }

        /* Modern Dashboard Cards */
        .dashboard-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px; margin-top: 2rem;
        }

        .card {
            background: var(--card-bg); padding: 2.5rem 1.5rem; border-radius: 24px;
            text-align: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            position: relative; overflow: hidden;
        }

        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(67, 97, 238, 0.15); }
        .card i { font-size: 3rem; margin-bottom: 1.5rem; color: var(--primary); }
        .card.notes { border-bottom: 5px solid #ff9f43; }
        .card.pdfs { border-bottom: 5px solid #ee5253; }
        .card.images { border-bottom: 5px solid #10ac84; }
        .card.videos { border-bottom: 5px solid #5f27cd; }
        .card.links { border-bottom: 5px solid #00d2d3; }

        /* Feature View UI */
        .view-section { display: none; animation: slideUp 0.6s ease; }
        .active { display: block; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* Form Controls */
        .input-group { background: var(--card-bg); padding: 2rem; border-radius: 20px; margin-bottom: 2rem; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        input, textarea, select {
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px;
            border: 1px solid #ddd; background: var(--bg); color: var(--text);
        }

        .btn-main {
            background: var(--primary); color: white; border: none;
            padding: 12px 30px; border-radius: 12px; cursor: pointer; font-weight: 600;
        }
        .btn-main:hover { background: var(--secondary); transform: scale(1.05); }

        /* Data Lists */
        .data-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; margin-top: 2rem; }
        .item-card { background: var(--card-bg); padding: 15px; border-radius: 15px; border-left: 5px solid var(--primary); }

        /* Chatbot */
        #chat-trigger {
            position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: white; cursor: pointer; box-shadow: 0 10px 30px rgba(67, 97, 238, 0.4);
            font-size: 1.5rem; z-index: 1001;
        }

        #chatbot {
            position: fixed; bottom: 110px; right: 30px; width: 380px; height: 500px;
            background: var(--card-bg); border-radius: 25px; display: none;
            flex-direction: column; box-shadow: 0 15px 50px rgba(0,0,0,0.2);
            z-index: 1001; border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

<header>
    <h2 style="color: var(--primary)"><i class="fas fa-brain"></i> AI Assistant</h2>
    <div>
        <button onclick="toggleDarkMode()" class="btn-main" style="background:transparent; color:var(--text)"><i class="fas fa-moon"></i></button>
        <button onclick="showView('dashboard')" class="btn-main">Dashboard</button>
    </div>
</header>

<div class="container">
    <div id="dashboard" class="view-section active">
        <h1 style="text-align: center; margin-bottom: 2rem;">Digital Workspace</h1>
        <div class="dashboard-grid">
            <div class="card notes" onclick="showView('notes')"><i class="fas fa-edit"></i><h3>Notepad</h3><p>Secure thoughts & notes</p></div>
            <div class="card pdfs" onclick="showView('pdfs')"><i class="fas fa-file-pdf"></i><h3>PDF Vault</h3><p>Important documents</p></div>
            <div class="card images" onclick="showView('images')"><i class="fas fa-images"></i><h3>Gallery</h3><p>Image cloud storage</p></div>
            <div class="card videos" onclick="showView('videos')"><i class="fas fa-play-circle"></i><h3>Video Library</h3><p>Video URLs & metadata</p></div>
            <div class="card links" onclick="showView('bookmarks')"><i class="fas fa-link"></i><h3>Bookmarks</h3><p>Web resources</p></div>
        </div>
    </div>

    <div id="notes" class="view-section">
        <button onclick="showView('dashboard')" class="btn-main" style="margin-bottom:1rem;">← Back</button>
        <div class="input-group">
            <h3>Add New Note</h3>
            <input type="text" id="note-title" placeholder="Note Title...">
            <textarea id="note-content" placeholder="Start typing your note here..." style="height:150px;"></textarea>
            <button onclick="saveNote()" class="btn-main"><i class="fas fa-save"></i> Save to Cloud</button>
        </div>
        <div id="notes-list" class="data-grid"></div>
    </div>

    <div id="pdfs" class="view-section">
        <button onclick="showView('dashboard')" class="btn-main" style="margin-bottom:1rem;">← Back</button>
        <div class="input-group">
            <h3>Upload PDF</h3>
            <input type="file" id="pdf-file" accept=".pdf">
            <button onclick="handleFileUpload('pdf')" class="btn-main"><i class="fas fa-upload"></i> Upload to Drive</button>
        </div>
        <div id="pdfs-list" class="data-grid"></div>
    </div>

    <div id="images" class="view-section">
        <button onclick="showView('dashboard')" class="btn-main" style="margin-bottom:1rem;">← Back</button>
        <div class="input-group">
            <h3>Upload Image</h3>
            <input type="file" id="image-file" accept="image/*">
            <button onclick="handleFileUpload('image')" class="btn-main"><i class="fas fa-camera"></i> Save Gallery</button>
        </div>
        <div id="images-list" class="data-grid"></div>
    </div>

    <div id="videos" class="view-section">
        <button onclick="showView('dashboard')" class="btn-main" style="margin-bottom:1rem;">← Back</button>
        <div class="input-group">
            <h3>Add Video Link</h3>
            <input type="text" id="video-title" placeholder="Video Title">
            <input type="text" id="video-url" placeholder="YouTube or Direct Link URL">
            <button onclick="saveVideo()" class="btn-main"><i class="fas fa-video"></i> Add Video</button>
        </div>
        <div id="videos-list" class="data-grid"></div>
    </div>

    <div id="bookmarks" class="view-section">
        <button onclick="showView('dashboard')" class="btn-main" style="margin-bottom:1rem;">← Back</button>
        <div class="input-group">
            <h3>Save Bookmark</h3>
            <input type="text" id="link-title" placeholder="Website Name">
            <input type="text" id="link-url" placeholder="https://example.com">
            <button onclick="saveBookmark()" class="btn-main"><i class="fas fa-bookmark"></i> Save Link</button>
        </div>
        <div id="bookmarks-list" class="data-grid"></div>
    </div>
</div>

<div id="chat-trigger" onclick="toggleChat()"><i class="fas fa-comment-dots"></i></div>
<div id="chatbot">
    <div style="background:var(--primary); color:white; padding:1.5rem; border-radius:25px 25px 0 0; display:flex; justify-content:space-between;">
        <span>AI Assistant</span>
        <i class="fas fa-times" onclick="toggleChat()" style="cursor:pointer"></i>
    </div>
    <div id="chat-logs" style="flex:1; padding:1rem; overflow-y:auto; font-size: 0.9rem;"></div>
    <div style="padding:1rem; display:flex; gap:10px; border-top:1px solid #eee;">
        <input type="text" id="chat-input" placeholder="Ask AI about your data..." style="margin:0">
        <button onclick="askAI()" class="btn-main" style="padding:10px 15px"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzcaM4uUopc6jpCgVUpsYmWe8Wrn_AlI-0J4Rt1o2aBle6BVGPBoWfbA14SSsiYBa7p/exec';
    // --- Core Navigation ---
    function showView(viewId) {
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        if(viewId !== 'dashboard') fetchData(viewId);
    }

    // --- Data Fetching ---
    async function fetchData(type) {
        const listDiv = document.getElementById(`${type}-list`);
        listDiv.innerHTML = '<p><i class="fas fa-spinner fa-spin"></i> Loading data...</p>';
        try {
            const response = await fetch(`${API_URL}?target=${capitalize(type)}`);
            const data = await response.json();
            renderData(type, data);
        } catch (e) {
            listDiv.innerHTML = '<p>Error connecting to Google Sheets.</p>';
        }
    }

    function renderData(type, data) {
        const container = document.getElementById(`${type}-list`);
        if(!data || data.length === 0) {
            container.innerHTML = '<p>No data found.</p>';
            return;
        }
        container.innerHTML = data.map(item => `
            <div class="item-card">
                <h4 style="margin:0; color:var(--primary)">${item.title || item.name || 'Untitled'}</h4>
                <p style="font-size:0.85rem">${item.content || ''}</p>
                ${item.drive_url ? `<a href="${item.drive_url}" target="_blank" class="btn-main" style="display:inline-block; font-size:10px; padding:5px 10px; margin-top:5px">View File</a>` : ''}
                ${item.website_url ? `<a href="${item.website_url}" target="_blank" class="btn-main" style="display:inline-block; font-size:10px; padding:5px 10px; margin-top:5px">Open Link</a>` : ''}
                ${item.video_url ? `<iframe width="100%" height="150" src="${item.video_url.replace('watch?v=', 'embed/')}" frameborder="0" allowfullscreen></iframe>` : ''}
            </div>
        `).join('');
    }

    // --- Save Functions ---
    async function saveNote() {
        const title = document.getElementById('note-title').value;
        const content = document.getElementById('note-content').value;
        if(!title || !content) return alert("Please fill all fields");

        const res = await sendToCloud('addData', 'Notes', [title, content]);
        if(res.status === 'success') {
            alert("Note Saved!");
            document.getElementById('note-title').value = '';
            document.getElementById('note-content').value = '';
            fetchData('notes');
        }
    }

    async function saveVideo() {
        const title = document.getElementById('video-title').value;
        const url = document.getElementById('video-url').value;
        const res = await sendToCloud('addData', 'Videos', [title, url, 'URL']);
        if(res.status === 'success') { fetchData('videos'); }
    }

    async function saveBookmark() {
        const title = document.getElementById('link-title').value;
        const url = document.getElementById('link-url').value;
        const res = await sendToCloud('addData', 'Bookmarks', [title, url, 'General']);
        if(res.status === 'success') { fetchData('bookmarks'); }
    }

    // --- File Handling (Images/PDFs) ---
    async function handleFileUpload(type) {
        const fileInput = document.getElementById(`${type}-file`);
        const file = fileInput.files[0];
        if(!file) return alert("Select a file first");

        const reader = new FileReader();
        reader.onload = async () => {
            const base64 = reader.result.split(',')[1];
            const response = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'uploadFile',
                    type: type,
                    filename: file.name,
                    mimeType: file.type,
                    base64: base64
                })
            });
            alert('File Saved to Google Drive!');
            fetchData(type + 's');
        };
        reader.readAsDataURL(file);
    }

    // --- Helper Functions ---
    async function sendToCloud(action, target, values) {
        const response = await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({ action, target, values })
        });
        return await response.json();
    }

    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
    function toggleChat() { 
        const chat = document.getElementById('chatbot');
        chat.style.display = chat.style.display === 'flex' ? 'none' : 'flex';
    }
    function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

    // --- AI Chat Logic ---
    async function askAI() {
        const input = document.getElementById('chat-input');
        const logs = document.getElementById('chat-logs');
        const query = input.value;
        if(!query) return;

        logs.innerHTML += `<div style="text-align:right; margin-bottom:10px;"><b>You:</b> ${query}</div>`;
        input.value = '';

        if(query.toLowerCase().includes('note')) {
            const res = await fetch(`${API_URL}?target=Notes`);
            const data = await res.json();
            logs.innerHTML += `<div style="background:#eee; padding:10px; border-radius:10px; margin-bottom:10px;"><b>AI:</b> You have ${data.length} notes saved. Use the Notepad section to read them all.</div>`;
        } else {
            logs.innerHTML += `<div style="background:#eee; padding:10px; border-radius:10px; margin-bottom:10px;"><b>AI:</b> I can help you find files and notes. Try asking "how many notes I have?"</div>`;
        }
        logs.scrollTop = logs.scrollHeight;
    }
</script>
</body>
</html>
